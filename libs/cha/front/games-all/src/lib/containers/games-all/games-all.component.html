<blade-layout-feature-content>
  <div class="h-full overflow-hidden">
    <div class="pt-2" *ngIf="season$ | async">
      <div class="text-lg text-center" style="font-weight: 100">
        {{ season$ | async }} Season
      </div>
    </div>

    <blade-divider></blade-divider>

    <p-progressBar
      mode="indeterminate"
      [style]="{ height: '6px' }"
      *ngIf="isLoading$ | async"
    ></p-progressBar>

    <div class="px-2 overflow-y-auto games-days pb-8">
      <blade-card *ngIf="isLoaded$ | async">
        <blade-card-body>
          <ng-container *ngIf="schedule$ | async as schedule">
            <cha-front-games-all-table
              [schedule]="schedule"
            ></cha-front-games-all-table>
          </ng-container>
        </blade-card-body>
      </blade-card>
    </div>

  </div>
</blade-layout-feature-content>
